<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Minecraft classic 0.0.1</title>
  <link rel="stylesheet" href="styles.css">

  <link rel="icon" type="image/png" sizes="16x16" href="icon/icon.png">
  <link rel="apple-touch-icon" sizes="16x16" href="icon/icon.png">
  <link rel="shortcut icon" href="icon/icon.png">
</head>

<body>
  <div id="ui-layer">
    <div id="main-menu" class="overlay-screen">
      <div class="mc-logo-group">
        <h1 class="mc-title">MINECRAFT</h1>
        <span class="edition">classic JS</span>
      </div>

      <div class="menu-buttons">
        <button id="btn-to-world-config" class="mc-button">新しい世界を作成</button>
        <button id="btn-load-saved" class="mc-button">保存した世界から再開</button>

        <div class="mc-button-row">
          <button id="btn-open-settings" class="mc-button half">設定...</button>
          <button id="btn-quit" class="mc-button half">終了</button>
        </div>
      </div>

      <div class="mc-footer">
        <span>Minecraft Classic 0.0.1</span>
      </div>
    </div>

    <div id="settings-menu" class="overlay-screen" style="display: none;">
      <h2 class="mc-title" style="font-size: 24px; margin-bottom: 20px;">設定</h2>

      <div class="menu-buttons settings-grid">
        <div class="setting-item">
          <span>描画距離: <span id="renderDistVal">6</span></span>
          <input type="range" id="range-render-dist" min="0" max="16" value="6">
        </div>

        <div class="setting-item">
          <span>明るさ: <span id="brightnessVal">50</span>%</span>
          <input type="range" id="brightnessSlider" min="0" max="100" value="50">
        </div>

        <div class="mc-button-row">
          <button id="btn-settings-reset" class="mc-button half">リセット</button>
          <button id="btn-settings-back" class="mc-button half">完了</button>
        </div>
      </div>
    </div>

    <div id="world-config" class="overlay-screen" style="display:none;">
      <h2 class="mc-title" style="font-size: 40px; margin-bottom: 30px;">世界の設定</h2>

      <div class="config-content" style="margin-bottom: 20px;">
        <div class="config-group">
          <p class="mc-label" style="text-align: left; margin-bottom: 5px;">シード値:</p>
          <input type="text" id="world-seed" class="mc-input" placeholder="空欄でランダム生成">
        </div>
      </div>

      <div class="menu-buttons">
        <button id="btn-start-game" class="mc-button">生成開始！</button>
        <button id="btn-back-to-menu" class="mc-button">キャンセル</button>
      </div>
    </div>

    <div id="loading-screen" class="overlay-screen" style="display:none;">
      <div class="loading-container">
        <div class="loading-text">世界を構築中...</div>
        <div class="progress-bar">
          <div id="loading-fill"></div>
        </div>
      </div>
    </div>

    <div id="pause-menu" class="overlay-screen" style="display:none; z-index: 2000;">
      <h2 class="mc-label">ゲームメニュー</h2>
      <div class="menu-buttons" style="display: flex; flex-direction: column; gap: 10px;">
        <button id="btn-resume" class="mc-button">ゲームに戻る</button>

        <button id="btn-open-settings-pause" class="mc-button">設定</button>

        <button id="btn-save-quit" class="mc-button">保存してタイトルへ戻る</button>
      </div>
    </div>

  </div>

  <div id="crosshair"></div>
  <div class="overzindex">
    <div id="fpsCounter"></div>
  </div>

  <div id="hotbar"></div>

  <div id="inventory-container">
    <div id="inventory"></div>
  </div>

  <div id="left-controls">
    <div id="touch-dpad">
      <button class="dpad-btn" id="dpad-up">↑</button>
      <button class="dpad-btn" id="dpad-left">←</button>
      <button class="dpad-btn" id="dpad-down">↓</button>
      <button class="dpad-btn" id="dpad-right">→</button>
      <button class="touch-action-btn" id="btn-sneak">
        <svg width="24" height="24" viewBox="0 0 24 24">
          <circle cx="12" cy="6" r="2" fill="white" />
          <path d="M12 8 L12 14" stroke="white" stroke-width="2" stroke-linecap="round" />
          <path d="M10 14 Q12 16 14 14" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" />
        </svg>
      </button>
    </div>
  </div>

  <div id="right-controls">
    <button class="touch-action-btn" id="btn-jump">
      <svg width="24" height="24" viewBox="0 0 24 24">
        <path d="M12 2 L12 22" stroke="white" stroke-width="2" stroke-linecap="round" />
        <path d="M5 9 L12 2 L19 9" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" />
      </svg>
    </button>
  </div>

  <div id="screenOverlayHtml" style="pointer-events: none;"></div>

  <div id="chat-container"></div>

  <script type="module" defer src="blocks.js"></script>
  <script type="module" defer src="cloudsky.js"></script>
  <script type="module" defer src="script.js"></script>

</body>

</html>
